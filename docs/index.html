<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG-study 文档阅读器</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --surface: #fffaf0;
        --surface-strong: #fbf3e2;
        --ink: #18211d;
        --muted: #5e665f;
        --line: #d9cfbd;
        --accent: #1f7a68;
        --accent-strong: #12594b;
        --code-bg: #20251f;
        --code-ink: #f2f0e7;
        --warn: #a35f14;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(31, 122, 104, 0.1) 1px, transparent 1px),
          linear-gradient(rgba(31, 122, 104, 0.08) 1px, transparent 1px),
          var(--bg);
        background-size: 28px 28px;
        font-family:
          "Microsoft YaHei UI",
          "PingFang SC",
          "Noto Sans CJK SC",
          "Segoe UI",
          sans-serif;
        line-height: 1.7;
      }

      a {
        color: var(--accent-strong);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
        border-right: 1px solid var(--line);
        background: rgba(255, 250, 240, 0.96);
        padding: 22px 18px;
      }

      .brand {
        padding-bottom: 18px;
        border-bottom: 2px solid var(--ink);
        margin-bottom: 18px;
      }

      .brand strong {
        display: block;
        font-size: 1.45rem;
        line-height: 1.1;
      }

      .brand span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .search {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 16px;
        background: #fffdf7;
        color: var(--ink);
        font: inherit;
      }

      nav h2 {
        margin: 18px 0 8px;
        color: #7b4d20;
        font-size: 0.78rem;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .nav-link {
        display: block;
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--ink);
        font-size: 0.94rem;
      }

      .nav-link:hover,
      .nav-link.active {
        background: var(--surface-strong);
        color: var(--accent-strong);
        text-decoration: none;
      }

      main {
        min-width: 0;
        padding: clamp(18px, 4vw, 42px);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 auto 18px;
        max-width: 980px;
      }

      .toolbar button,
      .toolbar a {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        padding: 8px 11px;
      }

      .toolbar button:hover,
      .toolbar a:hover {
        border-color: var(--accent);
        color: var(--accent-strong);
        text-decoration: none;
      }

      .doc {
        max-width: 980px;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.97);
        padding: clamp(20px, 4vw, 46px);
      }

      .doc h1,
      .doc h2,
      .doc h3 {
        line-height: 1.25;
      }

      .doc h1 {
        margin: 0 0 18px;
        padding-bottom: 14px;
        border-bottom: 2px solid var(--ink);
        font-size: clamp(2rem, 5vw, 3.5rem);
      }

      .doc h2 {
        margin-top: 34px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
        font-size: 1.45rem;
      }

      .doc h3 {
        margin-top: 24px;
        color: #7b4d20;
        font-size: 1.1rem;
      }

      .doc p,
      .doc li {
        color: #26322c;
      }

      .doc blockquote {
        margin: 18px 0;
        border-left: 4px solid var(--accent);
        background: #edf7f3;
        padding: 10px 14px;
      }

      .doc pre {
        overflow: auto;
        border-radius: 7px;
        background: var(--code-bg);
        color: var(--code-ink);
        padding: 16px;
      }

      .doc code {
        border-radius: 4px;
        background: #ece4d6;
        padding: 0.12em 0.32em;
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 0.92em;
      }

      .doc pre code {
        background: transparent;
        padding: 0;
        color: inherit;
      }

      .doc table {
        width: 100%;
        border-collapse: collapse;
        margin: 18px 0;
        font-size: 0.94rem;
      }

      .doc th,
      .doc td {
        border: 1px solid var(--line);
        padding: 9px 10px;
        vertical-align: top;
      }

      .doc th {
        background: var(--surface-strong);
        text-align: left;
      }

      .status {
        min-height: 1.6em;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .fallback {
        border: 1px solid #dfbd89;
        border-radius: 7px;
        background: #fff2db;
        color: #5f3908;
        padding: 12px 14px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 880px) {
        .app {
          grid-template-columns: 1fr;
        }

        aside {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .toolbar {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand">
          <strong>RAG-study</strong>
          <span>一个 HTML 入口阅读全部 Markdown，适合从零学习 RAG 与代码实现。</span>
        </div>
        <input class="search" id="search" type="search" placeholder="过滤文档标题" aria-label="过滤文档标题" />
        <nav id="nav" aria-label="文档导航"></nav>
      </aside>

      <main>
        <div class="toolbar">
          <div class="status" id="status">正在加载文档...</div>
          <a id="rawLink" href="README.md">打开原始 Markdown</a>
        </div>
        <article class="doc" id="doc"></article>
      </main>
    </div>

    <script>
      const docs = [
        {
          group: "先读这些",
          items: [
            ["docs/README.md", "文档总览"],
            ["docs/learning/rag-basics.md", "RAG 从 0 到 1"],
            ["docs/learning/rag-pipeline.md", "RAG 全流程图解"],
            ["docs/learning/advanced-rag-patterns.md", "进阶 RAG 技术地图"],
          ],
        },
        {
          group: "核心知识",
          items: [
            ["docs/learning/chunking.md", "分块 Chunking"],
            ["docs/learning/embeddings-and-vectors.md", "向量与检索"],
            ["docs/learning/query-rewriting-and-memory.md", "查询改写与记忆"],
          ],
        },
        {
          group: "架构与代码",
          items: [
            ["docs/architecture/system-overview.md", "系统总览"],
            ["docs/architecture/api-contract.md", "共享 API 契约"],
            ["docs/architecture/code-reading-map.md", "代码阅读地图"],
            ["docs/architecture/backend-comparison.md", "三后端实现对照"],
            ["docs/architecture/data-model.md", "数据模型"],
          ],
        },
        {
          group: "工程资料",
          items: [
            ["docs/runbooks/local-development.md", "本地开发与联调"],
            ["docs/requirements/product-scope.md", "产品范围"],
            ["docs/requirements/milestones.md", "里程碑"],
            ["docs/decisions/0001-python-first.md", "ADR 0001"],
          ],
        },
      ];

      const nav = document.querySelector("#nav");
      const doc = document.querySelector("#doc");
      const status = document.querySelector("#status");
      const rawLink = document.querySelector("#rawLink");
      const search = document.querySelector("#search");

      function normalizePath(path) {
        return path.replace(/^docs\//, "");
      }

      function buildNav(filter = "") {
        nav.innerHTML = "";
        for (const section of docs) {
          const matches = section.items.filter(([, label]) => label.toLowerCase().includes(filter.toLowerCase()));
          if (matches.length === 0) continue;
          const title = document.createElement("h2");
          title.textContent = section.group;
          nav.appendChild(title);
          for (const [path, label] of matches) {
            const link = document.createElement("a");
            link.href = `#${normalizePath(path)}`;
            link.className = "nav-link";
            link.textContent = label;
            link.dataset.path = normalizePath(path);
            nav.appendChild(link);
          }
        }
        setActiveLink(currentPath());
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function resolveHref(href, basePath) {
        if (/^(https?:|mailto:|#)/.test(href)) return href;

        const baseParts = basePath.split("/");
        baseParts.pop();
        let aboveDocsRoot = 0;
        for (const part of href.split("/")) {
          if (!part || part === ".") continue;
          if (part === "..") {
            if (baseParts.length) {
              baseParts.pop();
            } else {
              aboveDocsRoot += 1;
            }
          } else {
            baseParts.push(part);
          }
        }

        const resolved = baseParts.join("/");
        if (resolved.endsWith(".md")) return `#${resolved}`;

        return `${"../".repeat(aboveDocsRoot)}${resolved}`;
      }

      function inlineMarkdown(value, basePath) {
        return escapeHtml(value)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_match, label, href) => {
            const safeHref = resolveHref(href.replace(/^\.\//, ""), basePath);
            return `<a href="${escapeHtml(safeHref)}">${escapeHtml(label)}</a>`;
          });
      }

      function renderTable(lines, basePath) {
        const rows = lines
          .filter((line, index) => index !== 1 || !/^\s*\|?\s*:?-{3,}:?\s*\|/.test(line))
          .map((line) =>
            line
              .trim()
              .replace(/^\|/, "")
              .replace(/\|$/, "")
              .split("|")
              .map((cell) => cell.trim()),
          );
        return `<table>${rows
          .map((row, index) => {
            const tag = index === 0 ? "th" : "td";
            return `<tr>${row.map((cell) => `<${tag}>${inlineMarkdown(cell, basePath)}</${tag}>`).join("")}</tr>`;
          })
          .join("")}</table>`;
      }

      function renderMarkdown(markdown, basePath) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        const html = [];
        let inCode = false;
        let codeLines = [];
        let listLines = [];
        let orderedListLines = [];
        let tableLines = [];
        let para = [];

        function flushParagraph() {
          if (para.length) {
            html.push(`<p>${inlineMarkdown(para.join(" "), basePath)}</p>`);
            para = [];
          }
        }

        function flushList() {
          if (listLines.length) {
            html.push(`<ul>${listLines.map((line) => `<li>${inlineMarkdown(line, basePath)}</li>`).join("")}</ul>`);
            listLines = [];
          }
        }

        function flushOrderedList() {
          if (orderedListLines.length) {
            html.push(`<ol>${orderedListLines.map((line) => `<li>${inlineMarkdown(line, basePath)}</li>`).join("")}</ol>`);
            orderedListLines = [];
          }
        }

        function flushTable() {
          if (tableLines.length) {
            html.push(renderTable(tableLines, basePath));
            tableLines = [];
          }
        }

        for (const raw of lines) {
          const line = raw;
          if (line.startsWith("```")) {
            flushParagraph();
            flushList();
            flushOrderedList();
            flushTable();
            if (inCode) {
              html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
              codeLines = [];
              inCode = false;
            } else {
              inCode = true;
            }
            continue;
          }

          if (inCode) {
            codeLines.push(line);
            continue;
          }

          if (!line.trim()) {
            flushParagraph();
            flushList();
            flushOrderedList();
            flushTable();
            continue;
          }

          if (/^\|.+\|$/.test(line.trim())) {
            flushParagraph();
            flushList();
            flushOrderedList();
            tableLines.push(line);
            continue;
          }

          flushTable();

          const heading = /^(#{1,4})\s+(.+)$/.exec(line);
          if (heading) {
            flushParagraph();
            flushList();
            flushOrderedList();
            const level = Math.min(heading[1].length, 3);
            html.push(`<h${level}>${inlineMarkdown(heading[2], basePath)}</h${level}>`);
            continue;
          }

          const list = /^\s*[-*]\s+(.+)$/.exec(line);
          if (list) {
            flushParagraph();
            flushOrderedList();
            listLines.push(list[1]);
            continue;
          }

          const orderedList = /^\s*\d+\.\s+(.+)$/.exec(line);
          if (orderedList) {
            flushParagraph();
            flushList();
            orderedListLines.push(orderedList[1]);
            continue;
          }

          if (line.startsWith("> ")) {
            flushParagraph();
            flushList();
            flushOrderedList();
            html.push(`<blockquote>${inlineMarkdown(line.slice(2), basePath)}</blockquote>`);
            continue;
          }

          para.push(line.trim());
        }

        flushParagraph();
        flushList();
        flushOrderedList();
        flushTable();
        return html.join("\n");
      }

      function currentPath() {
        return decodeURIComponent(location.hash.replace(/^#/, "")) || "README.md";
      }

      function setActiveLink(path) {
        document.querySelectorAll(".nav-link").forEach((link) => {
          link.classList.toggle("active", link.dataset.path === path);
        });
      }

      async function loadDoc() {
        const path = currentPath();
        const fetchPath = path.startsWith("docs/") ? path : path;
        setActiveLink(path);
        rawLink.href = fetchPath;
        status.textContent = `正在阅读：${path}`;

        try {
          const response = await fetch(fetchPath, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const markdown = await response.text();
          doc.innerHTML = renderMarkdown(markdown, path);
          status.textContent = `已加载：${path}`;
        } catch (error) {
          doc.innerHTML = `
            <div class="fallback">
              <strong>无法直接加载 Markdown。</strong>
              <p>浏览器通常会限制从本地文件 fetch 文档。请在项目根目录执行 <code>python -m http.server 9000</code>，然后访问 <code>http://localhost:9000/docs/</code>。</p>
              <p>当前文档仍可通过右上角“打开原始 Markdown”查看。</p>
            </div>
          `;
          status.textContent = `加载失败：${path}`;
        }
      }

      search.addEventListener("input", () => buildNav(search.value));
      window.addEventListener("hashchange", loadDoc);

      buildNav();
      loadDoc();
    </script>
  </body>
</html>
