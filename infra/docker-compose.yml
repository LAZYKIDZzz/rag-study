services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-study-postgres
    environment:
      POSTGRES_DB: ragstudy
      POSTGRES_USER: ragstudy
      POSTGRES_PASSWORD: ragstudy
    ports:
      - "5432:5432"
    volumes:
      - rag-study-postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: rag-study-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - rag-study-qdrant:/qdrant/storage

volumes:
  rag-study-postgres:
  rag-study-qdrant:
